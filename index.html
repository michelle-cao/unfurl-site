<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>unfurl</title>
<style>
  :root{
    --purple:#8968EA; --bg:#F9F8FB; --surface:#FFFFFF;
    --text:#21182D; --muted:#6F6789; --line:#E7E3F0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; align-items:center; justify-content:center; line-height:1.6;
  }
  .wrap{max-width:520px; padding:48px 24px; text-align:center;}
  .brand{font-weight:700; font-size:22px; color:var(--purple); letter-spacing:.02em;}
  p{color:var(--muted); margin:12px 0 28px;}
  .links{display:flex; flex-direction:column; gap:12px; max-width:320px; margin:0 auto;}
  a.btn{
    display:block; background:var(--surface); border:1px solid var(--line);
    border-radius:12px; padding:14px 18px; text-decoration:none; color:var(--text);
    font-weight:500;
  }
  a.btn:hover{border-color:var(--purple); color:var(--purple);}
  footer{margin-top:32px; color:var(--muted); font-size:13px;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">unfurl</div>
    <p>A conversation-card app. Better questions for the people in front of you.</p>
    <div class="links">
      <a class="btn" href="support.html">Support</a>
      <a class="btn" href="privacy-policy.html">Privacy Policy</a>
      <a class="btn" href="terms-of-service.html">Terms of Service</a>
    </div>
    <footer>© 2026 Michelle Cao</footer>
  </div>
</body>
</html>
